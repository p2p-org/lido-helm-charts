# Default values for oracle.
# Oracle repository: https://github.com/lidofinance/lido-oracle

# configuration of app
kinds:
  - accounting
  - ejector
  - csm
  - cm

app:
  #  Accounting Oracle (AO)
  accounting:
    el_node_rpc: "http://localhost:8545/"
    cl_node_rpc: "http://localhost:3500/"

    prometheus_port: "9000"
    healthcheck_server_port: "9010"
    keys_api_uri: "http://kapi"

    # mainnet: 0xC1d0b3DE6792Bf6b4b37EccdcC24e45978Cfd2Eb
    # goerli:  0x1eDf09b5023DC86737b59dE68a8130De878984f5
    # holešky: 0x28FAB2059C713A7F9D8c86Db49f9bb0e96Af1ef8
    lido_locator_address: "0x1eDf09b5023DC86737b59dE68a8130De878984f5"

    tx_gas_addition: "100000"
    daemon: "false"
    allow_reporting_in_bunker_mode: "false"
    # add secrets variables to your external config
    # member_priv_key: ""
    # member_priv_key_file: ""
    # telemetry_data_bus_rpc: ""
    # filebase_ipfs_host: ""
    # filebase_ipfs_token: ""

  #  Validator Exit Bus Oracle (VEBO)
  ejector:
    el_node_rpc: "http://localhost:8545/"
    cl_node_rpc: "http://localhost:3500/"

    prometheus_port: "9000"
    healthcheck_server_port: "9010"
    keys_api_uri: "http://kapi"

    # mainnet: 0xC1d0b3DE6792Bf6b4b37EccdcC24e45978Cfd2Eb
    # goerli:  0x1eDf09b5023DC86737b59dE68a8130De878984f5
    # holešky: 0x28FAB2059C713A7F9D8c86Db49f9bb0e96Af1ef8
    lido_locator_address: "0x28FAB2059C713A7F9D8c86Db49f9bb0e96Af1ef8"

    tx_gas_addition: "100000"
    daemon: "false"
    # add secrets variables to your external config
    # member_priv_key: ""
    # member_priv_key_file: ""
    # telemetry_data_bus_rpc: ""
    # filebase_ipfs_host: ""
    # filebase_ipfs_token: ""

  # Community Staking Module (CSM)
  csm:
    el_node_rpc: "http://localhost:8545/"
    cl_node_rpc: "http://localhost:3500/"

    prometheus_port: "9000"
    healthcheck_server_port: "9010"
    keys_api_uri: "http://kapi"

    # mainnet: 0xC1d0b3DE6792Bf6b4b37EccdcC24e45978Cfd2Eb
    # goerli:  0x1eDf09b5023DC86737b59dE68a8130De878984f5
    # holešky: 0x28FAB2059C713A7F9D8c86Db49f9bb0e96Af1ef8
    lido_locator_address: "0x28FAB2059C713A7F9D8c86Db49f9bb0e96Af1ef8"

    tx_gas_addition: "100000"
    daemon: "false"

    cache_path: "/cache"

    # hoodi: 0x79CEf36D84743222f37765204Bec41E92a93E59d
    staking_module_address: "0x79CEf36D84743222f37765204Bec41E92a93E59d"
    # add secrets variables to your external config
    # member_priv_key: ""
    # member_priv_key_file: ""
    # telemetry_data_bus_rpc: ""
    # filebase_ipfs_host: ""
    # filebase_ipfs_token: ""

  # Curated Module Oracle (CM)
  cm:
    el_node_rpc: "http://localhost:8545/"
    cl_node_rpc: "http://localhost:3500/"

    prometheus_port: "9000"
    healthcheck_server_port: "9010"
    keys_api_uri: "http://kapi"

    # mainnet: 0xC1d0b3DE6792Bf6b4b37EccdcC24e45978Cfd2Eb
    # hoodi: 0xe2EF9536DAAAEBFf5b1c130957AB3E80056b06D8
    lido_locator_address: "0xe2EF9536DAAAEBFf5b1c130957AB3E80056b06D8"

    # hoodi: 0x87EB69Ae51317405FD285efD2326a4a11f6173b9
    staking_module_address: "0x87EB69Ae51317405FD285efD2326a4a11f6173b9"
    # add secrets variables to your external config
    # member_priv_key: ""
    # member_priv_key_file: ""
    # telemetry_data_bus_rpc: ""
    # filebase_ipfs_host: ""
    # filebase_ipfs_token: ""

# Kubernetes configuration
replicaCount: 1

# Version: 8
image:
  repository: docker.io/lidofinance/oracle@sha256
  tag: "0851cd003b4c9a13bd696dcb7892b3afa20e31f2d02ffd7e262cf6c1b874ad22"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext:
  runAsGroup: 1001
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: false

extraEnv: []
extraEnvFrom: []

service:
  type: ClusterIP
  port: 9000

# use PersistentVolumeClaim to store cache data for CSM
cache:
  enabled: false
  storageClassName: ""
  size: "1Gi"

livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 5
  periodSeconds: 10
  successThreshold: 1
  tcpSocket:
    port: 9000
  timeoutSeconds: 2

readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 5
  periodSeconds: 10
  successThreshold: 1
  tcpSocket:
    port: 9000
  timeoutSeconds: 2

startupProbe:
  httpGet:
    path: /
    port: http
  failureThreshold: 10
  periodSeconds: 60

resources:
  limits:
    memory: 8192Mi
  requests:
    cpu: 1
    memory: 8192Mi

# performance-collector and performance-web sidecars for CSM/CM oracle pods
performanceSidecars:
  enabled: false
  kinds:
    - cm
    - csm

  collector:
    consensus_client_uri: "http://localhost:3500/"
    performance_db_host: "postgres"
    performance_db_port: "5432"
    performance_db_name: "performance"
    performance_db_user: "performance"
    # performance_db_password: ""
    performance_db_pool_size: "10"
    performance_db_max_overflow: "20"
    performance_db_pool_recycle_seconds: "3600"
    max_cycle_lifetime_in_seconds: "60000"
    resources:
      limits:
        memory: 8192Mi
      requests:
        cpu: 2
        memory: 8192Mi

  web:
    performance_db_host: "postgres"
    performance_db_port: "5432"
    performance_db_name: "performance"
    performance_db_user: "performance"
    # performance_db_password: ""
    performance_db_pool_size: "10"
    performance_db_max_overflow: "20"
    performance_db_pool_recycle_seconds: "3600"
    resources:
      limits:
        memory: 2048Mi
      requests:
        cpu: 1
        memory: 2048Mi

volumes: []
nodeSelector: {}
tolerations: []
affinity: {}
